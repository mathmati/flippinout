<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>Flippinout — Authentic Split-Flap Display for Any Screen</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="page-frame">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">Flippinout</div>
      <nav class="header-nav">
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
        <button class="volume-icon" id="volume-btn" title="Toggle sound">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        </button>
      </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1>The authentic split-flap display for any screen.</h1>
      <p class="subtitle">That iconic mechanical airport board—just like the real thing. Monochrome themes, live clock, no rainbow gimmicks.</p>
      <div class="hero-cta">
        <input type="email" placeholder="you@example.com">
        <button id="cta-btn">Try It Now</button>
      </div>
      <p style="margin-top: 16px; font-size: 13px; color: #999;">Press <kbd style="background: #e0e0e0; padding: 2px 6px; border-radius: 3px; font-family: monospace;">T</kbd> for vintage themes · <kbd style="background: #e0e0e0; padding: 2px 6px; border-radius: 3px; font-family: monospace;">C</kbd> for clock · <kbd style="background: #e0e0e0; padding: 2px 6px; border-radius: 3px; font-family: monospace;">F</kbd> for fullscreen</p>
    </section>

    <!-- Board -->
    <section class="board-section" id="board-container">
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
